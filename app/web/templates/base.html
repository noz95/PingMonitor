<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Network Monitor{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <a class="navbar-brand fw-bold" href="/"><i class="bi bi-activity me-2"></i>Network Monitor</a>
  <div class="navbar-nav ms-auto flex-row gap-2">
    <a class="nav-link {% if request.path=='/' %}active{% endif %}" href="/">Dashboard</a>
    <a class="nav-link {% if request.path=='/probes' %}active{% endif %}" href="/probes">Sondes</a>
    <a class="nav-link {% if request.path=='/groups' %}active{% endif %}" href="/groups">Groupes</a>
    <a class="nav-link {% if request.path=='/network-scan' %}active{% endif %}" href="/network-scan">Scan réseau</a>
    <a class="nav-link {% if request.path=='/settings' %}active{% endif %}" href="/settings">Paramètres</a>
  </div>
</nav>

<div class="container-fluid py-4 px-4">
  <div id="toast-container" class="position-fixed top-0 end-0 p-3" style="z-index:9999"></div>
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
